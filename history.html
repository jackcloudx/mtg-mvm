<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — MTG | MVM</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .hist-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .hist-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); padding: 10px 18px; cursor: pointer;
      font-size: 14px; font-family: var(--font-head); margin-bottom: -1px; transition: all 0.15s;
    }
    .hist-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .hist-view { display: none; }
    .hist-view.active { display: block; }

    .seasons-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    @media (max-width: 900px) { .seasons-layout { grid-template-columns: 1fr; } }

    .season-index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .season-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px; cursor: pointer; transition: border-color 0.15s, transform 0.1s;
    }
    .season-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
    .season-card-num { font-family: var(--font-head); font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .season-card-champ { font-family: var(--font-head); font-size: 18px; color: var(--gold); margin-bottom: 4px; }
    .season-card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .season-card-stats { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid var(--border); }
    .season-card-stat-val { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--text-primary); display: block; }
    .season-card-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

    .adv-bucket-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
    .adv-bucket-tab { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .adv-bucket-tab.active { border-color: var(--gold-dim); color: var(--gold); background: var(--bg-card); }
    .adv-stat-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .adv-stat-table th { text-align: right; color: var(--text-muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
    .adv-stat-table th:first-child { text-align: left; }
    .adv-stat-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; color: var(--text-secondary); }
    .adv-stat-table td:first-child { text-align: left; color: var(--text-primary); font-weight: 500; }
    .adv-stat-table tr:hover td { background: rgba(255,255,255,0.02); }
    .hof-rail { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: sticky; top: 76px; }
    .hof-rail-title { font-family: var(--font-head); font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .hof-item { display: grid; grid-template-columns: 120px 40px 1fr; align-items: baseline; gap: 0 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .hof-item:last-child { border-bottom: none; }
    .hof-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .hof-value { font-size: 12px; font-weight: 700; color: var(--gold); font-family: var(--font-mono); }
    .hof-detail { font-size: 10px; color: var(--text-secondary); }

    .season-detail-view { display: none; }
    .season-detail-view.active { display: block; }
    .season-header-block { background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px; }
    .season-header-block .season-num { font-family: var(--font-head); font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
    .season-header-block .season-champ-name { font-family: var(--font-head); font-size: 30px; color: var(--gold); margin-bottom: 4px; }
    .season-header-block .season-champ-label { color: var(--text-secondary); font-size: 14px; }

    .accordion-section { margin-bottom: 14px; }
    .accordion-header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; cursor: pointer; transition: border-color 0.15s; }
    .accordion-header:hover { border-color: var(--gold-dim); }
    .accordion-header.expanded { border-color: var(--gold-dim); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .accordion-title { font-family: var(--font-head); font-size: 15px; color: var(--text-primary); }
    .accordion-meta { font-size: 12px; color: var(--text-muted); }
    .accordion-icon { color: var(--text-muted); transition: transform 0.2s; font-size: 14px; }
    .accordion-header.expanded .accordion-icon { transform: rotate(180deg); }
    .accordion-body { display: none; border: 1px solid var(--gold-dim); border-top: none; border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); padding: 18px; background: var(--accordion-body-bg); }
    .accordion-body.expanded { display: block; }
    .playoff-game-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .playoff-game-row:last-child { border-bottom: none; }
    .playoff-game-row .pgr-teams { color: var(--text-primary); }
    .playoff-game-row .pgr-score { font-family: var(--font-mono); color: var(--gold); }

    .report-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .report-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .report-card-team { font-weight: 700; font-size: 14px; color: var(--text-primary); margin-bottom: 2px; }
    .report-card-theme { font-size: 11px; color: var(--gold-dim); font-style: italic; margin-bottom: 8px; }
    .report-card-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
    .report-card-row:last-of-type { border-bottom: none; margin-bottom: 8px; }
    .report-card-row .rc-label { color: var(--text-muted); }
    .report-card-row .rc-val { color: var(--text-secondary); text-align: right; max-width: 65%; }
    .report-card-writeup { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-top: 8px; }

    .at-toggle { display: flex; gap: 4px; margin-bottom: 18px; }
    .at-toggle button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 7px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
    .at-toggle button.active { border-color: var(--gold-dim); color: var(--gold); }
    .at-table-wrap { overflow-x: auto; }
    .at-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .at-table th { text-align: left; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    .at-table th:hover { color: var(--text-secondary); }
    .at-table th.num, .at-table td.num { text-align: right; }
    .at-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .at-table tr:hover td { background: var(--bg-card); }
    .at-table a { color: var(--text-primary); font-weight: 500; }
    .at-table a:hover { color: var(--gold); }
    .champ-badge { display: inline-block; background: var(--gold-dim); color: var(--gold); font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; font-weight: 600; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-logo">MTG | MVM <span>The League</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#games">Game Log</a>
      <a href="index.html#teams">Teams</a>
      <a href="history.html" class="active">History</a>
      <a href="admin.html" style="color:var(--text-muted)">Admin</a>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀ Light</button>
    </nav>
  </div>
</header>

<div class="container">

  <div class="hist-tabs">
    <button class="hist-tab active" onclick="switchHistTab('seasons', this)">Seasons</button>
    <button class="hist-tab" onclick="switchHistTab('alltime', this)">All-Time</button>
  </div>

  <div id="histview-seasons" class="hist-view active">
    <div id="index-view">
      <div class="seasons-layout">
        <div>
          <div class="section-header" style="margin-bottom:20px">
            <span class="section-title" style="font-size:16px;color:var(--text-secondary)">League History — Seasons 1 through 8</span>
          </div>
          <div class="season-index-grid" id="season-index-grid">
            <div style="color:var(--text-muted)">Loading...</div>
          </div>
        </div>
        <div class="hof-rail" id="hof-rail">
          <div class="hof-rail-title">League Records</div>
          <div id="hof-rail-content">Loading...</div>
        </div>
      </div>
    </div>
    <div id="team-detail-view" class="season-detail-view"></div>
  </div>

  <div id="histview-alltime" class="hist-view">
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:6px">Every team that has ever competed in The League, Seasons 1–8. Click a column header to sort. Click a team name for their full history.</p>
    <p style="color:var(--text-muted);font-size:11px;margin-bottom:16px" id="at-footnote"></p>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:18px">
      <div class="at-toggle">
        <button id="at-toggle-franchise" class="active" onclick="setAtMode('franchise')">By Franchise</button>
        <button id="at-toggle-season" onclick="setAtMode('season')">By Season</button>
      </div>
      <div class="at-toggle">
        <button id="at-toggle-basic" class="active" onclick="setAtStats('basic')">Basic</button>
        <button id="at-toggle-advanced" onclick="setAtStats('advanced')">Advanced</button>
      </div>
    </div>
    <div id="at-adv-buckets" style="display:none;margin-bottom:14px">
      <div class="adv-bucket-tabs" id="at-adv-tabs">
        <button class="adv-bucket-tab active" onclick="setAtAdvBucket('Damage_Profile',this)">Damage Profile</button>
        <button class="adv-bucket-tab" onclick="setAtAdvBucket('Life_Margin',this)">Life Margin</button>
        <button class="adv-bucket-tab" onclick="setAtAdvBucket('Pace',this)">Pace</button>
        <button class="adv-bucket-tab" onclick="setAtAdvBucket('Board_State',this)">Board State</button>
        <button class="adv-bucket-tab" onclick="setAtAdvBucket('Deployment_Efficiency',this)">Deployment Efficiency</button>
      </div>
    </div>
    <div class="at-table-wrap">
      <table class="at-table" id="at-table">
        <thead id="at-thead"></thead>
        <tbody id="at-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let historyData = null;
let atMode = 'franchise';
let atSortField = 'avg_power_score';
let atSortDir = -1;

async function init() {
  const res = await fetch('data/history.json');
  historyData = await res.json();
  renderIndex();
  renderHallOfFameRail();
  renderAllTime();
}

function switchHistTab(view, btn) {
  document.querySelectorAll('.hist-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.hist-view').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('histview-' + view).classList.add('active');
}

function renderHallOfFameRail() {
  const container = document.getElementById('hof-rail-content');
  const r = historyData.league_records;
  if (!r) { container.innerHTML = ''; return; }
  const items = [
    { label: 'Fastest Win', value: r.fastest_win.value + 't', team: r.fastest_win.team, link: r.fastest_win.link, action: `hofNavigate(JSON.parse(this.dataset.link||'null'), null)` },
    { label: 'Largest Margin', value: '+' + r.biggest_margin.value, team: r.biggest_margin.team, link: r.biggest_margin.link, action: `hofNavigate(JSON.parse(this.dataset.link||'null'), null)` },
    { label: 'Most Dmg, 1 Game', value: r.most_damage_single_game.value, team: r.most_damage_single_game.team, link: r.most_damage_single_game.link, action: `hofNavigate(JSON.parse(this.dataset.link||'null'), null)` },
    { label: 'Best Season Record', value: (r.best_season_record.value*100).toFixed(0)+'%', team: r.best_season_record.team, action: `hofNavigate(null, 1)` },
    { label: 'Best Season Power', value: r.highest_season_power.value, team: r.highest_season_power.team, action: `hofNavigate(null, 5)` },
    { label: 'Most Titles', value: r.most_championships.value + 'x', team: r.most_championships.team, action: `hofNavigateTeam('No Lands For You')` },
    { label: 'Most All-Time Wins', value: r.most_total_wins.value, team: r.most_total_wins.team, action: `hofNavigateAllTime('total_w')` },
    { label: 'Best All-Time Win%', value: r.best_alltime_winpct.value+'%', team: r.best_alltime_winpct.team, action: `hofNavigateTeam('Mean Machine')` },
    { label: 'Longest Win Streak', value: r.longest_win_streak.value + 'g', team: r.longest_win_streak.team, action: `hofNavigate(null, 7)` },
    { label: 'Longest Skid', value: r.longest_loss_streak.value + 'g', team: r.longest_loss_streak.team, action: `hofNavigate(null, 3)` },
    { label: 'Most Career MVPs', value: r.most_mvps_single_card.value + 'x', team: r.most_mvps_single_card.team, action: null },
    { label: 'Top Rivalry Gap', value: r.most_lopsided_rivalry.value + 'g', team: r.most_lopsided_rivalry.team, action: null },
  ];
  container.innerHTML = items.map((i, idx) => {
    const clickAttr = i.action ? `onclick="${i.action}"` : '';
    const dataAttr = i.link ? `data-link='${JSON.stringify(i.link).replace(/'/g, "&apos;")}'` : '';
    const indicator = (i.action || i.link) ? `<span style="font-size:9px;color:var(--gold-dim);margin-left:4px">↗</span>` : '';
    const cursor = (i.action || i.link) ? 'cursor:pointer' : '';
    return `<div class="hof-item" ${dataAttr} ${clickAttr} style="${cursor}">
      <span class="hof-label">${i.label}</span>
      <span class="hof-value">${i.value}${indicator}</span>
      <span class="hof-detail">${i.team}</span>
    </div>`;
  }).join('');
}

function hofNavigate(link, season) {
  const seasonsTab = document.querySelector('.hist-tab');
  switchHistTab('seasons', seasonsTab);
  const targetSeason = link ? link.season : season;
  if (!targetSeason) return;
  showSeason(targetSeason);
  if (link && link.week) {
    setTimeout(() => {
      const accordions = document.querySelectorAll('.accordion-header');
      for (const acc of accordions) {
        if (acc.querySelector('.accordion-title')?.textContent?.includes('Game Log')) {
          if (!acc.classList.contains('expanded')) toggleAccordion(acc);
          break;
        }
      }
      setTimeout(() => {
        const gameId = `game-${link.season}-${Math.round(link.week)}-${(link.winner||'').replace(/['\s]+/g,'-')}`;
        const noteId = gameId + '-note';
        const gameEl = document.getElementById(gameId);
        if (gameEl) {
          const noteEl = document.getElementById(noteId);
          if (noteEl) noteEl.style.display = 'block';
          setTimeout(() => {
            gameEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            gameEl.style.transition = 'background 1.5s';
            gameEl.style.background = 'var(--gold-dim)';
            setTimeout(() => gameEl.style.background = '', 1800);
          }, 500);
        } else {
          console.log('Game element not found:', gameId);
        }
      }, 400);
    }, 300);
  } else {
    setTimeout(() => {
      const accordions = document.querySelectorAll('.accordion-header');
      for (const acc of accordions) {
        if (acc.querySelector('.accordion-title')?.textContent?.includes('Game Log')) {
          if (!acc.classList.contains('expanded')) toggleAccordion(acc);
          acc.scrollIntoView({ behavior: 'smooth', block: 'start' });
          break;
        }
      }
    }, 150);
  }
}

function hofNavigateTeam(team) {
  window.location.href = `team-history.html?team=${encodeURIComponent(team)}`;
}

function hofNavigateAllTime(sortField) {
  switchHistTab('alltime', document.querySelectorAll('.hist-tab')[1]);
  setTimeout(() => {
    setAtMode('franchise');
    atSortField = sortField;
    atSortDir = -1;
    renderAllTime();
  }, 100);
}

function renderIndex() {
  const container = document.getElementById('season-index-grid');
  const seasons = Object.values(historyData.seasons).sort((a,b) => b.season - a.season);
  container.innerHTML = seasons.map(s => {
    const champStanding = s.standings.find(t => t.is_champion);
    const regGames = s.games.filter(g => g.match_type === 'Regular Season').length;
    return `<div class="season-card" onclick="showSeason(${s.season})">
      <div class="season-card-num">Season ${s.season}</div>
      <div class="season-card-champ">${s.champion || 'Unknown'}${champStanding && champStanding.seed ? ` <span style="font-size:13px;color:var(--text-muted);font-weight:normal">#${champStanding.seed} seed</span>` : ''}</div>
      <div class="season-card-label">League Champion${champStanding ? ` · ${champStanding.w}-${champStanding.l}` : ''}</div>
      <div class="season-card-stats">
        <div><span class="season-card-stat-val">${s.team_count}</span><span class="season-card-stat-label">Teams</span></div>
        <div><span class="season-card-stat-val">${regGames}</span><span class="season-card-stat-label">Games</span></div>
      </div>
    </div>`;
  }).join('');
}

function showSeason(seasonNum) {
  const season = historyData.seasons[seasonNum];
  if (!season) return;
  document.getElementById('index-view').style.display = 'none';
  const detail = document.getElementById('team-detail-view');
  detail.classList.add('active');

  const hasDivisions = season.standings.some(t => t.division && t.division !== 'None' && t.division !== 'null');
  const standings = [...season.standings].sort((a,b) => (b.win_pct||0) - (a.win_pct||0));

  const rowHtml = (t) => `<tr>
      <td class="team-rank num">${t.seed ?? '—'}</td>
      <td><a href="team-history.html?team=${encodeURIComponent(t.team)}" style="color:var(--text-primary)">${t.team}</a>${t.is_champion ? ' 👑' : ''}</td>
      <td class="num">${t.gp ?? '—'}</td>
      <td class="num">${t.w ?? '—'}</td>
      <td class="num">${t.l ?? '—'}</td>
      <td class="num">${t.win_pct != null ? (t.win_pct*100).toFixed(1)+'%' : '—'}</td>
      <td class="num"><span class="power-score">${t.power_score ?? '—'}</span></td>
      <td class="num" style="color:var(--text-muted)">${t.udpi != null ? t.udpi.toFixed(3) : '—'}</td>
      <td style="font-size:12px;color:var(--text-secondary)">${t.team_mvp ? t.team_mvp + (t.team_mvp_count>1?' ('+t.team_mvp_count+'x)':'') : '—'}</td>
    </tr>`;

  let standingsRows = '';
  if (hasDivisions) {
    const divGroups = {};
    standings.forEach(t => { const div = t.division || 'Other'; (divGroups[div] = divGroups[div]||[]).push(t); });
    Object.entries(divGroups).forEach(([div, teams]) => {
      standingsRows += `<tr><td colspan="9" style="padding:10px 12px 4px;font-size:11px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid var(--border)">${div}</td></tr>`;
      teams.forEach(t => { standingsRows += rowHtml(t); });
    });
  } else {
    standingsRows = standings.map(rowHtml).join('');
  }

  const champStanding2 = standings.find(t => t.is_champion);

  const poSeries = season.playoff_series || [];
  const seriesByRound = {};
  poSeries.forEach(s => {
    const roundKey = `Round ${s.round}${s.division && s.division !== 'None' ? ' · ' + s.division : ''}`;
    (seriesByRound[roundKey] = seriesByRound[roundKey]||[]).push(s);
  });
  let playoffRows = '';
  if (Object.keys(seriesByRound).length === 0) {
    playoffRows = '<div style="color:var(--text-muted);font-size:13px">No playoff series data recorded.</div>';
  } else {
    Object.entries(seriesByRound).forEach(([roundLabel, seriesList]) => {
      playoffRows += `<div style="margin-bottom:20px"><div style="font-size:11px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${roundLabel}</div>`;
      seriesList.forEach(s => {
        const gamesHtml = s.games.map(g => {
          const scoreStr = (g.winner_score != null && g.loser_score != null) ? `${g.winner_score} – ${g.loser_score}` : 'N/A';
          const mvpStr = g.mvp ? ` · ${g.mvp}` : '';
          const turnsStr = g.turns ? ` · ${g.turns} turns` : '';
          return `<div style="font-size:12px;color:var(--text-muted);padding:3px 0 3px 12px;border-left:2px solid var(--border)">Gm ${g.game}: ${g.winner} def. ${g.loser} ${scoreStr}${turnsStr}${mvpStr}</div>`;
        }).join('');
        const seriesId = `series-${Math.random().toString(36).slice(2)}`;
        playoffRows += `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;cursor:pointer" onclick="document.getElementById('${seriesId}').style.display=document.getElementById('${seriesId}').style.display==='none'?'block':'none'">
              <span style="font-size:14px;font-weight:500"><span style="color:var(--text-primary)">${s.series_winner}</span><span style="color:var(--gold);font-family:var(--font-mono);margin:0 8px">${s.series_result}</span><span style="color:var(--text-muted)">${s.series_loser}</span></span>
              <span style="font-size:11px;color:var(--text-muted)">${s.games.length} games ▾</span>
            </div>
            <div id="${seriesId}" style="display:none;padding:4px 0 8px">${gamesHtml}</div>
          </div>`;
      });
      playoffRows += `</div>`;
    });
  }

  const regGames = [...season.games].filter(g => g.match_type === 'Regular Season').sort((a,b) => (a.week||0) - (b.week||0));
  const commentary = season.game_commentary || [];
  const regGameRows = regGames.map(g => {
    const scoreStr = (g.winner_score != null && g.loser_score != null) ? `${g.winner_score} – ${g.loser_score}` : 'N/A';
    const mvpStr = g.mvp ? `<span style="color:var(--text-muted);margin-left:10px;font-size:11px">${g.mvp}</span>` : '';
    const divStr = g.division ? `<span style="color:var(--text-muted);font-size:11px">${g.division}</span>` : '';
    const gameNote = commentary.find(c => c.week === g.week && c.winner === g.winner && c.loser === g.loser);
    const noteHtml = gameNote
      ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.6;padding:6px 0 4px;border-top:1px solid var(--border);margin-top:4px">${gameNote.commentary}</div>`
      : '';
    const rowId = `game-${season.season}-${Math.round(g.week||0)}-${(g.winner||'').replace(/['\s]+/g,'-')}`;
    const noteRowId = rowId + '-note';
    return `<div id="${rowId}" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;cursor:${gameNote?'pointer':'default'}" ${gameNote?`onclick="document.getElementById('${noteRowId}').style.display=document.getElementById('${noteRowId}').style.display==='none'?'block':'none'"`:''}>
        <span style="font-size:13px;color:var(--text-primary)">Wk ${g.week ?? '?'} · <strong>${g.winner}</strong> def. ${g.loser} ${divStr}${mvpStr}</span>
        <span style="font-family:var(--font-mono);color:var(--gold);font-size:13px">${scoreStr}${gameNote?' <span style="color:var(--text-muted);font-size:10px">▾</span>':''}</span>
      </div>
      <div id="${noteRowId}" style="display:none">${noteHtml}</div>
    </div>`;
  }).join('');

  const html = `
    <button class="back-btn" onclick="backToIndex()">← All Seasons</button>
    <div class="season-header-block">
      <div class="season-num">Season ${season.season}</div>
      <div class="season-champ-name">${season.champion || 'Unknown'}${champStanding2 && champStanding2.seed ? ` <span style="font-size:18px;color:var(--text-muted);font-weight:normal">#${champStanding2.seed} seed</span>` : ''}</div>
      <div class="season-champ-label">League Champion · ${champStanding2 ? champStanding2.w+'-'+champStanding2.l+' · ' : ''}${season.team_count} teams competed</div>
    </div>

    ${buildPreviewHtml(season)}
    ${buildRankChartHtml(season)}

    <div class="accordion-section">
      <div class="accordion-header expanded" onclick="toggleAccordion(this)">
        <span class="accordion-title">Final Standings</span>
        <span class="accordion-meta">${standings.length} teams<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body expanded">
        <div style="overflow-x:auto"><table class="standings-table"><thead><tr>
          <th class="num">Seed</th><th>Team</th><th class="num">GP</th><th class="num">W</th><th class="num">L</th><th class="num">WIN%</th><th class="num">PWR</th><th class="num">U-DPI</th><th>Team MVP</th>
        </tr></thead><tbody>${standingsRows}</tbody></table></div>
      </div>
    </div>

    ${buildReportCardsHtml(season)}

    ${buildAdvancedStatsHtml(season)}

    <div class="accordion-section">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title">Regular Season Game Log</span>
        <span class="accordion-meta">${regGames.length} games<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body" style="max-height:400px;overflow-y:auto">${regGameRows || '<div style="color:var(--text-muted);font-size:13px">No game log data.</div>'}</div>
    </div>

    <div class="accordion-section">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title">Playoff Results</span>
        <span class="accordion-meta">${poSeries.length} series<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body">${playoffRows}</div>
    </div>

    ${buildPostSeasonHtml(season)}
  `;
  detail.innerHTML = html;
  initAdvancedStats(seasonNum);
}

function backToIndex() {
  document.getElementById('index-view').style.display = 'block';
  document.getElementById('team-detail-view').classList.remove('active');
}

function buildAdvancedStatsHtml(season) {
  const adv = season.advanced_stats;
  if (!adv || Object.keys(adv).length === 0) return '';
  const teams = season.standings.map(s => s.team).filter(t => adv[t]);
  const f = (v, dec=2) => v != null ? Number(v).toFixed(dec) : '<span style="color:var(--text-muted)">—</span>';
  const BUCKETS = {
    'Damage Profile': { available: true, cols: [
      {key:'damage_pm',label:'Dmg +/-',dec:0},{key:'dgt',label:'DG/Turn'},
      {key:'dtt',label:'DT/Turn'},{key:'ddt',label:'DD/Turn'},
      {key:'dgg',label:'DG/Game'},{key:'dtg',label:'DT/Game'},{key:'ddg',label:'DD/Game'}] },
    'Life Margin': { available: true, cols: [
      {key:'win_life_delta',label:'Avg Margin-W'},{key:'lose_life_delta',label:'Avg Margin-L'}] },
    'Pace': { available: true, cols: [
      {key:'turn_w',label:'Turns-W'},{key:'turn_l',label:'Turns-L'},
      {key:'turns_per_game',label:'Turns/Game'},{key:'turn_delta',label:'W/L Delta'}] },
    'Board State': { available: season.season >= 4, note: 'Seasons 4-8', cols: [
      {key:'mana_w',label:'Mana-W'},{key:'mana_l',label:'Mana-L'},{key:'mana_delta',label:'Mana Δ'},
      {key:'opp_mana_w',label:'OppMana-W'},{key:'opp_mana_l',label:'OppMana-L'},
      {key:'hand_w',label:'Hand-W'},{key:'hand_l',label:'Hand-L'},{key:'hand_delta',label:'Hand Δ'},
      {key:'opp_hand_w',label:'OppHand-W'},{key:'opp_hand_l',label:'OppHand-L'}] },
    'Deployment Efficiency': { available: season.season >= 6, note: 'Seasons 6-8', cols: [
      {key:'deploy_w',label:'Deploy-W'},{key:'deploy_l',label:'Deploy-L'},{key:'deploy_delta',label:'Deploy Δ'},
      {key:'deploy_per_mana_w',label:'Dply/Mana-W'},{key:'deploy_per_mana_l',label:'Dply/Mana-L'},
      {key:'deploy_per_mana_delta',label:'Dply/Mana Δ'}] },
  };
  const bucketNames = Object.keys(BUCKETS);
  const sectionId = 'adv-' + season.season;
  const tablesHtml = bucketNames.map(name => {
    const bucket = BUCKETS[name];
    const tableId = 'adv-tbl-' + season.season + '-' + name.replace(/\s+/g,'_');
    if (!bucket.available) return '<div id="' + tableId + '" class="adv-bucket-view" style="display:none"><p style="color:var(--text-muted);font-size:13px;padding:12px 0">' + name + ' data not available for Season ' + season.season + '. Tracking began ' + (bucket.note||'') + '.</p></div>';
    const buildTable = () => {
      const thead = '<tr><th style="text-align:left">Team</th>' + bucket.cols.map(c => '<th onclick="advSortTable(\'' + tableId + '\',\'' + c.key + '\')">' + c.label + '</th>').join('') + '</tr>';
      const tbody = [...teams].map(team => { const row = adv[team]||{}; return '<tr><td>' + team + '</td>' + bucket.cols.map(c => '<td>' + f(row[c.key], c.dec??2) + '</td>').join('') + '</tr>'; }).join('');
      return '<thead>' + thead + '</thead><tbody>' + tbody + '</tbody>';
    };
    return '<div id="' + tableId + '" class="adv-bucket-view" style="display:none"><div style="overflow-x:auto"><table class="adv-stat-table" id="' + tableId + '-table">' + buildTable() + '</table></div></div>';
  }).join('');
  return '<div class="accordion-section"><div class="accordion-header" onclick="toggleAccordion(this)"><span class="accordion-title">Advanced Stats</span><span class="accordion-meta">5 buckets · ' + teams.length + ' teams<span class="accordion-icon">▾</span></span></div><div class="accordion-body"><div class="adv-bucket-tabs" id="' + sectionId + '-tabs">' + bucketNames.map((name,i) => '<button class="adv-bucket-tab' + (i===0?' active':'') + '" onclick="switchAdvBucket(\'' + sectionId + '\',\'' + name.replace(/\s+/g,'_') + '\',this)">' + name + '</button>').join('') + '</div>' + tablesHtml + '</div></div>';
}

function switchAdvBucket(sectionId, bucketKey, btn) {
  const tabsEl = document.getElementById(sectionId + '-tabs');
  tabsEl.querySelectorAll('.adv-bucket-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const seasonNum = sectionId.split('-')[1];
  ['Damage_Profile','Life_Margin','Pace','Board_State','Deployment_Efficiency'].forEach(b => {
    const el = document.getElementById('adv-tbl-' + seasonNum + '-' + b);
    if (el) el.style.display = b === bucketKey ? 'block' : 'none';
  });
}

function advSortTable(tableId, field) {
  const tableEl = document.getElementById(tableId + '-table');
  if (!tableEl) return;
  const rows = Array.from(tableEl.querySelectorAll('tbody tr'));
  const headers = Array.from(tableEl.querySelectorAll('thead th'));
  const colIndex = headers.findIndex(th => th.getAttribute('onclick') && th.getAttribute('onclick').includes(field));
  if (colIndex < 0) return;
  let dir = tableEl.dataset.sortDir === field + 'asc' ? -1 : 1;
  tableEl.dataset.sortDir = field + (dir === 1 ? 'asc' : 'desc');
  rows.sort((a,b) => { const av = parseFloat(a.cells[colIndex]?.textContent); const bv = parseFloat(b.cells[colIndex]?.textContent); if(isNaN(av)&&isNaN(bv))return 0; if(isNaN(av))return 1; if(isNaN(bv))return-1; return dir*(av-bv); });
  const tbody = tableEl.querySelector('tbody');
  rows.forEach(r => tbody.appendChild(r));
}

function initAdvancedStats(seasonNum) {
  const el = document.getElementById('adv-tbl-' + seasonNum + '-Damage_Profile');

}

function buildRankChartHtml(season) {
  const wr = season.weekly_ranks;
  if (!wr || Object.keys(wr).length === 0) return '';
  const teams = Object.keys(wr);
  const allWeeks = new Set();
  teams.forEach(t => Object.keys(wr[t].weekly_rank || {}).forEach(w => allWeeks.add(parseInt(w))));
  const weeks = [...allWeeks].sort((a,b) => a-b);
  if (weeks.length === 0) return '';
  const maxRank = teams.length;
  const W = 760, H = 280, padL = 36, padR = 140, padT = 16, padB = 30;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const xScale = (w) => padL + ((w - weeks[0]) / (weeks[weeks.length-1] - weeks[0] || 1)) * plotW;
  const yScale = (r) => padT + ((r - 1) / (maxRank - 1 || 1)) * plotH;
  const palette = ['#c9a84c','#7aa6c0','#a87ac9','#c97a9e','#7ac09e','#c0975a','#8a8ac0','#c0c07a','#c07a7a','#7ac0c0','#a89ec9','#c9a87a','#9ec97a','#c97ac0','#7a9ec9','#c9c97a'];
  let paths = '', legend = '';
  teams.forEach((team, idx) => {
    const color = palette[idx % palette.length];
    const rankData = wr[team].weekly_rank || {};
    const points = weeks.filter(w => rankData[w] != null).map(w => `${xScale(w)},${yScale(rankData[w])}`);
    if (points.length === 0) return;
    paths += `<polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="2" opacity="0.85" />`;
    legend += `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary);padding:2px 0"><span style="width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0"></span><span>${team}</span></div>`;
  });
  let yLabels = '';
  for (let r = 1; r <= maxRank; r += Math.max(1, Math.floor(maxRank/8))) yLabels += `<text x="${padL-8}" y="${yScale(r)+4}" text-anchor="end" font-size="10" fill="#666">${r}</text>`;
  let xLabels = '';
  weeks.forEach(w => { if (w % 4 === 1 || w === weeks[weeks.length-1]) xLabels += `<text x="${xScale(w)}" y="${H-padB+18}" text-anchor="middle" font-size="10" fill="#666">W${w}</text>`; });
  return `
    <div class="accordion-section">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title">Standings Over Time</span>
        <span class="accordion-meta">${weeks.length} weeks tracked<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body">
        <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
          <svg width="${W}" height="${H}" style="flex-shrink:0">
            <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#333" />
            <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#333" />
            ${yLabels}${xLabels}${paths}
          </svg>
          <div style="flex:1;min-width:140px;max-height:${H}px;overflow-y:auto">${legend}</div>
        </div>
        <div style="color:var(--text-muted);font-size:11px;margin-top:10px">Rank 1 = best record at that point in the season. Source: weekly standings log.</div>
      </div>
    </div>`;
}

function buildPostSeasonHtml(season) {
  const narr = season.narrative;
  if (!narr || !narr.tiers || narr.tiers.length === 0) return `
    <div class="accordion-section">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title">Post-Season Recap</span>
        <span class="accordion-meta">Coming soon<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body"><div style="color:var(--text-muted);font-size:13px">Post-season writeups will appear here.</div></div>
    </div>`;
  const totalTeams = narr.tiers.reduce((a,t) => a + t.teams.length, 0);
  let html = `
    <div class="accordion-section">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title">Post-Season Recap</span>
        <span class="accordion-meta">${narr.tiers.length} tiers · ${totalTeams} teams<span class="accordion-icon">▾</span></span>
      </div>
      <div class="accordion-body">`;
  narr.tiers.forEach(tier => {
    html += `<div style="margin-bottom:24px"><div style="font-family:var(--font-head);font-size:12px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)">${tier.tier_name}</div>`;
    tier.teams.forEach(t => {
      html += `<div style="margin-bottom:18px"><div style="font-weight:600;font-size:14px;color:var(--text-primary);margin-bottom:5px">${t.team}</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.8">${t.writeup}</div></div>`;
    });
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function toggleAccordion(headerEl) {
  headerEl.classList.toggle('expanded');
  headerEl.nextElementSibling.classList.toggle('expanded');
}

let atStatsMode = 'basic';
let atAdvBucket = 'Damage_Profile';

function setAtStats(mode) {
  atStatsMode = mode;
  document.getElementById('at-toggle-basic').classList.toggle('active', mode === 'basic');
  document.getElementById('at-toggle-advanced').classList.toggle('active', mode === 'advanced');
  document.getElementById('at-adv-buckets').style.display = mode === 'advanced' ? 'block' : 'none';
  renderAllTime();
}

function setAtAdvBucket(bucket, btn) {
  atAdvBucket = bucket;
  document.querySelectorAll('#at-adv-tabs .adv-bucket-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAllTime();
}

function setAtMode(mode) {
  atMode = mode;
  document.getElementById('at-toggle-franchise').classList.toggle('active', mode === 'franchise');
  document.getElementById('at-toggle-season').classList.toggle('active', mode === 'season');
  atSortField = mode === 'franchise' ? 'avg_power_score' : 'power_score';
  atSortDir = -1;
  renderAllTime();
}

function atSortBy(field) {
  if (atStatsMode === 'advanced') {
    if (atAdvSortField === field) atAdvSortDir *= -1;
    else { atAdvSortField = field; atAdvSortDir = field === 'team' ? 1 : -1; }
  } else {
    if (atSortField === field) atSortDir *= -1;
    else { atSortField = field; atSortDir = field === 'team' ? 1 : -1; }
  }
  renderAllTime();
}

let atAdvSortField = null;
let atAdvSortDir = -1;

function atSortByAdv(field, dec) {
  if (atAdvSortField === field) atAdvSortDir *= -1;
  else { atAdvSortField = field; atAdvSortDir = -1; }
  renderAllTime();
}

function renderAllTime() {
  const thead = document.getElementById('at-thead');
  const tbody = document.getElementById('at-tbody');
  const footnote = document.getElementById('at-footnote');

  const BUCKETS = {
    'Damage_Profile': { label: 'Damage Profile', cols: [
      {key:'damage_pm',label:'Dmg +/-',dec:0},{key:'dgt',label:'DG/Turn'},
      {key:'dtt',label:'DT/Turn'},{key:'ddt',label:'DD/Turn'},
      {key:'dgg',label:'DG/Game'},{key:'dtg',label:'DT/Game'},{key:'ddg',label:'DD/Game'}] },
    'Life_Margin': { label: 'Life Margin', cols: [
      {key:'win_life_delta',label:'Avg Margin-W'},{key:'lose_life_delta',label:'Avg Margin-L'}] },
    'Pace': { label: 'Pace', cols: [
      {key:'turn_w',label:'Turns-W'},{key:'turn_l',label:'Turns-L'},
      {key:'turns_per_game',label:'Turns/Game'},{key:'turn_delta',label:'W/L Delta'}] },
    'Board_State': { label: 'Board State', cols: [
      {key:'mana_w',label:'Mana-W'},{key:'mana_l',label:'Mana-L'},{key:'mana_delta',label:'Mana Δ'},
      {key:'opp_mana_w',label:'OppMana-W'},{key:'opp_mana_l',label:'OppMana-L'},
      {key:'hand_w',label:'Hand-W'},{key:'hand_l',label:'Hand-L'},{key:'hand_delta',label:'Hand Δ'},
      {key:'opp_hand_w',label:'OppHand-W'},{key:'opp_hand_l',label:'OppHand-L'}] },
    'Deployment_Efficiency': { label: 'Deployment Efficiency', cols: [
      {key:'deploy_w',label:'Deploy-W'},{key:'deploy_l',label:'Deploy-L'},{key:'deploy_delta',label:'Deploy Δ'},
      {key:'deploy_per_mana_w',label:'Dply/Mana-W'},{key:'deploy_per_mana_l',label:'Dply/Mana-L'},
      {key:'deploy_per_mana_delta',label:'Dply/Mana Δ'}] },
  };

  const f = (v, dec=2) => v != null ? Number(v).toFixed(dec) : '<span style="color:var(--text-muted)">—</span>';
  const bucket = BUCKETS[atAdvBucket];

  if (atMode === 'franchise') {
    footnote.textContent = atStatsMode === 'basic'
      ? '* Avg Power Score for teams with only 1 season played is shown for reference but excluded from top rankings (2-season minimum to qualify).'
      : 'Career averages across all seasons played. Mid-season name changes are treated as separate franchises.';

    let teams = Object.values(historyData.all_time_teams).map(t => ({...t, seasons_count: t.seasons_played.length}));

    if (atStatsMode === 'basic') {
      teams.sort((a,b) => { let av=a[atSortField],bv=b[atSortField]; if(typeof av==='string')return atSortDir*av.localeCompare(bv); return atSortDir*((av||0)-(bv||0)); });
      thead.innerHTML = `<tr>
        <th onclick="atSortBy('team')">Team</th>
        <th class="num" onclick="atSortBy('seasons_count')">Seasons</th>
        <th class="num" onclick="atSortBy('total_w')">W</th>
        <th class="num" onclick="atSortBy('total_l')">L</th>
        <th class="num" onclick="atSortBy('win_pct')">Win%</th>
        <th class="num" onclick="atSortBy('championships')">Titles</th>
        <th class="num" onclick="atSortBy('avg_power_score')">Avg PWR</th>
      </tr>`;
      tbody.innerHTML = teams.map(t => {
        const champBadge = t.championships > 0 ? `<span class="champ-badge">${t.championships}x 👑</span>` : '';
        const qualified = t.seasons_count >= 2;
        const pwrDisplay = qualified ? `<span class="power-score">${t.avg_power_score.toFixed(1)}</span>` : `<span style="color:var(--text-muted)">${t.avg_power_score.toFixed(1)}<span style="font-size:10px"> *</span></span>`;
        return `<tr>
          <td><a href="team-history.html?team=${encodeURIComponent(t.team)}">${t.team}</a>${champBadge}</td>
          <td class="num">${t.seasons_count}</td>
          <td class="num">${t.total_w}</td>
          <td class="num">${t.total_l}</td>
          <td class="num">${(t.win_pct*100).toFixed(1)}%</td>
          <td class="num">${t.championships}</td>
          <td class="num">${pwrDisplay}</td>
        </tr>`;
      }).join('');
    } else {
      const career = historyData.career_advanced_stats || {};
      const advFranchiseField = atAdvSortField || bucket.cols[0].key;
      const isStatField = bucket.cols.some(c => c.key === advFranchiseField);
      teams.sort((a,b) => {
        if (!isStatField) {
          const av = a[advFranchiseField], bv = b[advFranchiseField];
          if (typeof av === 'string') return atAdvSortDir * av.localeCompare(bv);
          return atAdvSortDir * ((av||0) - (bv||0));
        }
        const av = career[a.team]?.[advFranchiseField];
        const bv = career[b.team]?.[advFranchiseField];
        if(av==null&&bv==null)return 0; if(av==null)return 1; if(bv==null)return -1;
        return atAdvSortDir*(bv-av);
      });
      thead.innerHTML = `<tr><th onclick="atSortBy('team')">Team</th><th class="num" onclick="atSortBy('seasons_count')">Seasons</th>${bucket.cols.map(c=>`<th class="num" onclick="atSortByAdv('${c.key}',${c.dec??2})">${c.label}</th>`).join('')}</tr>`;
      tbody.innerHTML = teams.map(t => {
        const s = career[t.team] || {};
        return `<tr>
          <td><a href="team-history.html?team=${encodeURIComponent(t.team)}">${t.team}</a></td>
          <td class="num">${t.seasons_count}</td>
          ${bucket.cols.map(c=>`<td class="num">${f(s[c.key],c.dec??2)}</td>`).join('')}
        </tr>`;
      }).join('');
    }
  } else {
    footnote.textContent = atStatsMode === 'basic'
      ? 'Every individual team-season in league history. Answers: who was the most dominant single-season team ever?'
      : 'Advanced stats for every team-season. Switch buckets to explore different dimensions.';

    let rows = [...(historyData.by_season_leaderboard || [])];

    if (atStatsMode === 'basic') {
      rows.sort((a,b) => { let av=a[atSortField],bv=b[atSortField]; if(typeof av==='string')return atSortDir*av.localeCompare(bv); return atSortDir*((av||0)-(bv||0)); });
      thead.innerHTML = `<tr>
        <th onclick="atSortBy('team')">Team</th>
        <th class="num" onclick="atSortBy('season')">Season</th>
        <th class="num" onclick="atSortBy('seed')">Seed</th>
        <th class="num" onclick="atSortBy('w')">W</th>
        <th class="num" onclick="atSortBy('l')">L</th>
        <th class="num" onclick="atSortBy('win_pct')">Win%</th>
        <th class="num" onclick="atSortBy('power_score')">PWR</th>
      </tr>`;
      tbody.innerHTML = rows.map(r => {
        const champBadge = r.is_champion ? `<span class="champ-badge">👑</span>` : '';
        return `<tr>
          <td><a href="team-history.html?team=${encodeURIComponent(r.team)}">${r.team}</a>${champBadge}</td>
          <td class="num"><a href="#" onclick="switchHistTab('seasons',document.querySelector('.hist-tab'));showSeason(${r.season});return false;" style="color:var(--text-secondary)">S${r.season}</a></td>
          <td class="num">${r.seed??'—'}</td>
          <td class="num">${r.w??'—'}</td>
          <td class="num">${r.l??'—'}</td>
          <td class="num">${r.win_pct!=null?(r.win_pct*100).toFixed(1)+'%':'—'}</td>
          <td class="num"><span class="power-score">${(r.power_score??0).toFixed(1)}</span></td>
        </tr>`;
      }).join('');
    } else {
      const advSeasonField = atAdvSortField || bucket.cols[0].key;
      const isStatFieldS = bucket.cols.some(c => c.key === advSeasonField);
      rows.sort((a,b) => {
        if (!isStatFieldS) {
          const av = a[advSeasonField], bv = b[advSeasonField];
          if (typeof av === 'string') return atAdvSortDir * av.localeCompare(bv);
          return atAdvSortDir * ((av||0) - (bv||0));
        }
        const as = historyData.seasons[String(a.season)]?.advanced_stats?.[a.team];
        const bs = historyData.seasons[String(b.season)]?.advanced_stats?.[b.team];
        const av = as?.[advSeasonField], bv = bs?.[advSeasonField];
        if(av==null&&bv==null)return 0; if(av==null)return 1; if(bv==null)return -1;
        return atAdvSortDir*(bv-av);
      });
      thead.innerHTML = `<tr><th onclick="atSortBy('team')">Team</th><th class="num" onclick="atSortBy('season')">Season</th><th class="num" onclick="atSortBy('seed')">Seed</th>${bucket.cols.map(c=>`<th class="num" onclick="atSortByAdv('${c.key}',${c.dec??2})">${c.label}</th>`).join('')}</tr>`;
      tbody.innerHTML = rows.map(r => {
        const s = historyData.seasons[String(r.season)]?.advanced_stats?.[r.team] || {};
        const champBadge = r.is_champion ? `<span class="champ-badge">👑</span>` : '';
        return `<tr>
          <td><a href="team-history.html?team=${encodeURIComponent(r.team)}">${r.team}</a>${champBadge}</td>
          <td class="num">S${r.season}</td>
          <td class="num">${r.seed??'—'}</td>
          ${bucket.cols.map(c=>`<td class="num">${f(s[c.key],c.dec??2)}</td>`).join('')}
        </tr>`;
      }).join('');
    }
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
<script src="js/theme.js"></script>
</script>
</body>
</html>
