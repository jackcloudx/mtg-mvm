<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosters — MTG | MVM</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ---- ROSTERS PAGE ---- */
    .roster-page-header { margin-bottom: 24px; }
    .roster-page-title { font-family: var(--font-head); font-size: 24px; color: var(--gold); margin-bottom: 4px; }
    .roster-page-sub { font-size: 13px; color: var(--text-muted); }

    .roster-control-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .roster-toggle { display: flex; gap: 4px; }
    .roster-toggle button {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 7px 16px; border-radius: var(--radius);
      cursor: pointer; font-size: 13px; font-family: var(--font-body); transition: all 0.15s;
    }
    .roster-toggle button.active { border-color: var(--gold-dim); color: var(--gold); }
    .roster-toggle button:hover:not(.active) { border-color: var(--border-accent); color: var(--text-primary); }
    label.roster-lands-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); cursor: pointer; user-select: none;
      text-transform: none; letter-spacing: normal; font-weight: normal; margin-bottom: 0;
    }
    label.roster-lands-label input[type=checkbox] { accent-color: var(--gold); cursor: pointer; width: auto; }

    .roster-switcher { margin-bottom: 20px; }
    .roster-switcher-block { margin-bottom: 12px; }
    .roster-switcher-label {
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 7px;
    }
    .roster-switcher-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .roster-team-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted); padding: 3px 9px; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-family: var(--font-body); transition: all 0.15s;
      white-space: nowrap;
    }
    .roster-team-btn:hover:not(.active) { border-color: var(--border-accent); color: var(--text-secondary); }
    .roster-team-btn.active { border-color: var(--gold-dim); color: var(--gold); background: var(--bg-card); }
    .roster-team-btn.boss { color: var(--red); }
    .roster-team-btn.boss.active { border-color: var(--red); background: rgba(192,57,43,0.08); color: var(--red); }

    .roster-team-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .roster-team-name { font-family: var(--font-head); font-size: 18px; color: var(--text-primary); }
    .roster-card-count { font-size: 12px; color: var(--text-muted); }

    .roster-table-wrap { overflow-x: auto; }
    .roster-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .roster-table th {
      text-align: left; color: var(--text-muted); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 9px 12px;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .roster-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
    .roster-table td.muted { color: var(--text-muted); }
    .roster-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }
    [data-theme="dark"] .roster-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
    .roster-table tbody tr:hover td { background: rgba(184,151,42,0.08); }
    .roster-table tbody tr.has-note { background: rgba(184,151,42,0.05); }

    .txn-badge {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px;
      font-weight: 600; border: 1px solid var(--border); background: var(--bg-card);
    }
    .txn-Waive  { color: var(--gold);    border-color: var(--gold-dim); }
    .txn-Trade  { color: var(--green);   border-color: #1e7a45; }
    .txn-Buy    { color: #5b9cf6;        border-color: #1a5f8a; }
    .txn-Proxy  { color: var(--red);     border-color: var(--red); background: rgba(192,57,43,0.08); }
    .txn-Create { color: #a78bfa;        border-color: #7c3aed; }

    .proxy-badge {
      display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px;
      background: rgba(192,57,43,0.1); color: var(--red);
      border: 1px solid rgba(192,57,43,0.3); font-weight: 600;
    }

    .commit-btn {
      background: none; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 4px 12px; border-radius: var(--radius); cursor: pointer;
      font-size: 12px; font-family: var(--font-body); transition: all 0.15s;
    }
    .commit-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    .txn-history-section { margin-top: 28px; }
    .txn-history-label {
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .txn-row {
      display: flex; justify-content: space-between; font-size: 12px;
      padding: 5px 0; border-bottom: 1px solid var(--border); color: var(--text-secondary);
    }
    .txn-row:last-child { border-bottom: none; }

    .roster-filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .roster-filter-bar label { display: none; } /* suppress global label styles inside filter bar */
    .roster-filter-label { font-size: 12px; color: var(--text-muted); margin: 0; text-transform: none; letter-spacing: 0; }
    .roster-count { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    .roster-empty { color: var(--text-muted); font-size: 14px; padding: 32px 0; }

    /* filter bar selects — narrower than full-width global style */
    .roster-filter-bar select { width: auto; font-size: 13px; padding: 6px 10px; }
    .roster-filter-clear {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 5px 10px; border-radius: var(--radius); cursor: pointer;
      font-size: 12px; font-family: var(--font-body); transition: all 0.15s;
    }
    .roster-filter-clear:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* compact inline form controls inside the roster table */
    .roster-table select,
    .roster-table input[type=text] { font-size: 13px; padding: 5px 8px; border-radius: 4px; }
    .roster-table select       { width: auto; min-width: 90px; }
    .roster-table input[type=text]  { width: 100%; min-width: 110px; }
    .roster-table input[type=checkbox] {
      width: auto; cursor: pointer; accent-color: var(--gold); transform: scale(1.15);
    }
    .td-center { text-align: center; vertical-align: middle; }
    .td-commit { text-align: right; white-space: nowrap; min-width: 80px; }
  </style>
</head>
<body data-page="rosters">
  <div id="site-header"></div>

  <div class="container">
    <div class="roster-page-header">
      <div class="roster-page-title">Rosters</div>
      <div class="roster-page-sub">Season 9 league rosters, transactions, and notes</div>
    </div>
    <div id="rosters-root">
      <div class="roster-empty">Loading roster data…</div>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/header.js"></script>
  <script src="js/rosters.js"></script>
</body>
</html>
