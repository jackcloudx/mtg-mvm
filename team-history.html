<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team History — MTG | MVM</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .th-header {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .th-name { font-family: var(--font-head); font-size: 30px; color: var(--gold); margin-bottom: 6px; }
    .th-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 18px; }
    .th-stats-row { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
    .th-stat { text-align: center; min-width: 60px; }
    .th-stat-val { display: block; font-size: 24px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); white-space: nowrap; }
    .th-stat-val-sm { display: block; font-size: 24px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); white-space: nowrap; letter-spacing: -0.02em; }
    .th-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body data-page="team-history">

<div id="site-header"></div>

<div class="container">
  <button class="back-btn" onclick="history.back()">← Back to History</button>
  <div id="content">Loading...</div>
</div>

<script src="js/theme.js"></script>
<script src="js/header.js"></script>
<script>
async function init() {
  const params = new URLSearchParams(window.location.search);
  const teamName = params.get('team');
  if (!teamName) {
    document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">No team specified.</p>';
    return;
  }

  const res = await fetch('data/history.json');
  const history = await res.json();
  const team = history.all_time_teams[teamName];

  if (!team) {
    document.getElementById('content').innerHTML = `<p style="color:var(--text-muted)">No data found for "${teamName}".</p>`;
    return;
  }

  const champText = team.championships > 0
    ? `${team.championships}x League Champion (Season${team.championship_seasons.length > 1 ? 's' : ''} ${team.championship_seasons.join(', ')})`
    : 'No championships';

  const archetype = history.team_archetypes && history.team_archetypes[teamName];
  const archetypeHtml = archetype ? `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px">
      <div style="display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-family:var(--font-head);font-size:15px;color:var(--text-primary);font-weight:600">${archetype.archetype}</span>
        <span style="font-size:12px;color:var(--text-muted)">${archetype.colors.join(' · ')}</span>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">${archetype.flavor}</div>
      ${archetype.key_cards && archetype.key_cards.length ? `<div style="font-size:11px;color:var(--text-muted)">Key cards: <span style="color:var(--gold)">${archetype.key_cards.join(', ')}</span></div>` : ''}
    </div>` : '';

  const BOSS_TEAMS = ['Green Boss', 'Red Boss', 'Black Boss', 'Blue Boss', 'White Boss', 'Artifact Boss'];
  const isBossTeam = BOSS_TEAMS.includes(teamName);

  let headerStats = '';
  let mainContent = '';

  if (isBossTeam) {
    const structuredGames = (history.boss_fights || [])
      .filter(g => g.boss === teamName)
      .map(g => ({
        season: g.season, match_type: g.match_type, game: g.game,
        winner: g.winner, loser: g.loser, winner_score: g.winner_score,
        loser_score: g.loser_score, turns: g.turns, mvp: g.mvp,
        commentary: g.commentary || '', champion: g.champion,
        bossWon: g.winner === teamName, source: 'boss_fights'
      }));

    const historicalGames = [];
    if (teamName === 'Green Boss') {
      Object.entries(history.seasons).forEach(([sNum, season]) => {
        (season.games || []).forEach(g => {
          if (g.winner === 'Boss Fight' || g.loser === 'Boss Fight') {
            historicalGames.push({
              season: parseInt(sNum), match_type: g.match_type, game: g.game,
              winner: g.winner === 'Boss Fight' ? teamName : g.winner,
              loser: g.loser === 'Boss Fight' ? teamName : g.loser,
              winner_score: g.winner_score, loser_score: g.loser_score,
              turns: g.turns, mvp: g.mvp, commentary: '', champion: null,
              bossWon: g.winner === 'Boss Fight', source: 'historical'
            });
          }
        });
        (season.playoff_series || []).forEach(s => {
          (s.games || []).forEach(g => {
            if (g.winner === 'Boss Fight' || g.loser === 'Boss Fight') {
              historicalGames.push({
                season: parseInt(sNum), match_type: 'Playoffs', game: g.game,
                winner: g.winner === 'Boss Fight' ? teamName : g.winner,
                loser: g.loser === 'Boss Fight' ? teamName : g.loser,
                winner_score: g.winner_score, loser_score: g.loser_score,
                turns: g.turns, mvp: g.mvp, commentary: '', champion: null,
                bossWon: g.winner === 'Boss Fight', source: 'historical'
              });
            }
          });
        });
      });
    }

    const buildGameRow = (g) => {
      const opponent = g.bossWon ? g.loser : g.winner;
      const scoreStr = (g.winner_score != null && g.loser_score != null) ? `${g.winner_score} – ${g.loser_score}` : '—';
      const noteId = `boss-game-s${g.season}-${g.game}-${(opponent||'').replace(/\W+/g,'')}`;
      return `<div style="padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;${g.commentary?'cursor:pointer':''}" ${g.commentary?`onclick="const n=document.getElementById('${noteId}');n.style.display=n.style.display==='none'?'block':'none'"`:''}>
          <span>
            <span style="color:var(--gold)">${g.bossWon ? teamName : opponent}</span>
            <span style="color:var(--text-muted)"> def. </span>
            <span style="color:var(--text-secondary)">${g.bossWon ? opponent : teamName}</span>
            ${g.turns?`<span style="color:var(--text-muted);font-size:11px;margin-left:8px">${g.turns}t</span>`:''}
            ${g.mvp?`<span style="color:var(--text-muted);font-size:11px;margin-left:8px">${g.mvp}</span>`:''}
          </span>
          <span style="font-family:var(--font-mono);font-size:12px;color:${g.bossWon?'var(--green)':'var(--red)'}">${g.bossWon?'W':'L'} ${scoreStr}${g.commentary?' <span style="color:var(--text-muted);font-size:10px">▾</span>':''}</span>
        </div>
        ${g.commentary?`<div id="${noteId}" style="display:none;font-size:12px;color:var(--text-secondary);line-height:1.6;padding:8px 0 4px;white-space:pre-line">${g.commentary}</div>`:''}
      </div>`;
    };

    const allGames = [...historicalGames, ...structuredGames];
    const w = allGames.filter(g => g.bossWon).length;
    const l = allGames.filter(g => !g.bossWon).length;
    const winPct = allGames.length ? ((w / allGames.length) * 100).toFixed(1) + '%' : '—';

    headerStats = `
      <div class="th-stats-row">
        <div class="th-stat"><span class="th-stat-val">${w}</span><span class="th-stat-label">Wins</span></div>
        <div class="th-stat"><span class="th-stat-val">${l}</span><span class="th-stat-label">Losses</span></div>
        <div class="th-stat"><span class="th-stat-val">${w}-${l}</span><span class="th-stat-label">All-Time Record</span></div>
        <div class="th-stat"><span class="th-stat-val">${winPct}</span><span class="th-stat-label">Win %</span></div>
      </div>`;

    if (teamName === 'Green Boss') {
      const s3Games = historicalGames.filter(g => g.season === 3);
      const s3Regular = s3Games.filter(g => !g.match_type.toLowerCase().includes('playoff'));
      const s3Playoff = s3Games.filter(g => g.match_type.toLowerCase().includes('playoff'));
      const s3W = s3Games.filter(g => g.bossWon).length;
      const s3L = s3Games.filter(g => !g.bossWon).length;

      const bossCapacityGames = [
        ...historicalGames.filter(g => g.season === 7),
        ...structuredGames
      ].sort((a, b) => b.season - a.season || a.game - b.game);
      const bossCapacityW = bossCapacityGames.filter(g => g.bossWon).length;
      const bossCapacityL = bossCapacityGames.filter(g => !g.bossWon).length;

      const bossCapacityBySeason = {};
      bossCapacityGames.forEach(g => {
        if (!bossCapacityBySeason[g.season]) bossCapacityBySeason[g.season] = [];
        bossCapacityBySeason[g.season].push(g);
      });
      const bossCapacityHtml = Object.entries(bossCapacityBySeason)
        .sort(([a], [b]) => b - a)
        .map(([sNum, games]) => {
          const sW = games.filter(g => g.bossWon).length;
          const sL = games.filter(g => !g.bossWon).length;
          return `<div style="margin-top:10px">
            <div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;padding:6px 0 4px;border-top:1px solid var(--border)">Season ${sNum} · ${sW}-${sL}</div>
            ${games.map(buildGameRow).join('')}
          </div>`;
        }).join('');

      mainContent = `
        <div class="section-header"><span class="section-title">Boss Fight Record</span><span style="font-size:11px;color:var(--text-muted)">${bossCapacityW}-${bossCapacityL}</span></div>
        <div style="margin-bottom:28px">${bossCapacityHtml || '<div style="color:var(--text-muted);font-size:13px">No boss fight games recorded yet.</div>'}</div>
        <div class="section-header"><span class="section-title">Season 3 — Regular Season & Playoffs</span><span style="font-size:11px;color:var(--text-muted)">${s3W}-${s3L}</span></div>
        <div style="margin-bottom:24px">
          ${s3Playoff.length ? `<div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;padding:6px 0 4px;border-top:1px solid var(--border)">Playoffs</div>${s3Playoff.map(buildGameRow).join('')}` : ''}
          ${s3Regular.length ? `<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:8px">Regular Season</div>${s3Regular.map(buildGameRow).join('')}` : ''}
        </div>
      `;
    } else {
      const bossCapacityBySeason = {};
      structuredGames.forEach(g => {
        if (!bossCapacityBySeason[g.season]) bossCapacityBySeason[g.season] = [];
        bossCapacityBySeason[g.season].push(g);
      });
      const gamesHtml = Object.entries(bossCapacityBySeason).map(([sNum, games]) => {
        const sW = games.filter(g => g.bossWon).length;
        const sL = games.filter(g => !g.bossWon).length;
        return `<div style="margin-top:10px">
          <div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;padding:6px 0 4px;border-top:1px solid var(--border)">Season ${sNum} · ${sW}-${sL}</div>
          ${games.map(buildGameRow).join('')}
        </div>`;
      }).join('');
      mainContent = `
        <div class="section-header"><span class="section-title">Boss Fight Record</span></div>
        <div style="margin-bottom:24px">${gamesHtml || '<div style="color:var(--text-muted);font-size:13px">No games recorded yet.</div>'}</div>`;
    }

  } else {
    // Collect mashup footnotes
    const mashupFootnotes = [];
    const seasonRows = team.season_records.map(s => {
      let mashupNote = '';
      if (s.mashupLabel) {
        const fnIndex = mashupFootnotes.length + 1;
        const roleText = s.mashupRole === 'first'
          ? `Pre-merge portion — played as "${s.mashupLabel}" once combined`
          : `Joined mid-season — played as "${s.mashupLabel}" once combined`;
        const playoffNote = (s.mashupRole === 'second' && s.playoff_w != null)
          ? ` Includes ${s.playoff_w}-${s.playoff_l} playoff record.`
          : '';
        mashupFootnotes.push(`<sup>${fnIndex}</sup> ${roleText}.${playoffNote}`);
        mashupNote = `<sup style="color:var(--gold);font-size:10px;cursor:default" title="${roleText}${playoffNote}">${fnIndex}</sup>`;
      }
      const playoffCell = (s.mashupRole === 'second' && s.playoff_w != null)
        ? `<td class="num" style="font-size:12px;color:var(--text-muted)">${s.playoff_w}-${s.playoff_l}</td>`
        : '<td class="num" style="color:var(--text-muted)">—</td>';
      return `<tr>
        <td><a href="history.html">Season ${s.season}</a>${s.is_champion ? ' 👑' : ''}${mashupNote}</td>
        <td class="num">${s.w}</td>
        <td class="num">${s.l}</td>
        <td class="num">${s.win_pct != null ? (s.win_pct*100).toFixed(1)+'%' : '—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${s.team_mvp ? s.team_mvp + (s.team_mvp_count > 1 ? ' (' + s.team_mvp_count + 'x)' : '') : '—'}</td>
        <td class="num"><span class="power-score">${s.power_score.toFixed(1)}</span></td>
        <td class="num" style="color:var(--text-muted)">${s.udpi != null ? s.udpi.toFixed(3) : '—'}</td>
        ${playoffCell}
      </tr>`;
    }).join('');

    const hasPlayoffs = team.season_records.some(s => s.mashupRole === 'second' && s.playoff_w != null);
    const footnotesHtml = mashupFootnotes.length
      ? `<div style="font-size:11px;color:var(--text-muted);margin-top:10px;line-height:1.8;border-top:1px solid var(--border);padding-top:10px">
          ${mashupFootnotes.map(f => `<div>${f}</div>`).join('')}
        </div>`
      : '';

    headerStats = `
      <div class="th-stats-row">
        <div class="th-stat">
          <span class="th-stat-val" style="color:var(--gold)">${team.championships}</span>
          <span class="th-stat-label">Titles</span>
        </div>
        <div class="th-stat">
          <span class="th-stat-val">${team.seasons_played.length}</span>
          <span class="th-stat-label">Seasons</span>
        </div>
        <div class="th-stat">
          <span class="th-stat-val">${team.total_w}-${team.total_l}</span>
          <span class="th-stat-label">All-Time Record</span>
        </div>
        <div class="th-stat">
          <span class="th-stat-val">${(team.win_pct*100).toFixed(1)}%</span>
          <span class="th-stat-label">All-Time Win %</span>
        </div>
        ${team.top_mvp_card ? `<div class="th-stat">
          <span class="th-stat-val-sm">${team.top_mvp_card}</span>
          <span class="th-stat-label">All-Time MVP${team.top_mvp_count ? ' · ' + team.top_mvp_count + 'x' : ''}</span>
        </div>` : ''}
      </div>`;

    mainContent = `
      <div class="section-header"><span class="section-title">Season-by-Season</span></div>
      <div style="overflow-x:auto;margin-bottom:24px">
        <table class="standings-table">
          <thead>
            <tr><th>Season</th><th class="num">W</th><th class="num">L</th><th class="num">Win%</th><th>Season MVP</th><th class="num">Power Score</th><th class="num">U-DPI</th>${hasPlayoffs ? '<th class="num">Playoffs</th>' : ''}</tr>
          </thead>
          <tbody>${seasonRows}</tbody>
        </table>
        ${footnotesHtml}
      </div>`;
  }

  const html = `
    <div class="th-header">
      <div class="th-name">${team.team}</div>
      ${archetype ? `<div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">${archetype.archetype} · ${archetype.colors.join(', ')}</div>` : ''}
      ${archetype ? `<div class="th-sub" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6;max-width:600px">${archetype.flavor}</div>` : ''}
      ${headerStats}
    </div>
    ${mainContent}
  `;
  // Build waiver log for this team across all seasons
  const teamWaivers = [];
  Object.entries(history.seasons).forEach(([sNum, season]) => {
    const waivers = (season.waivers || []).filter(w => w.team === teamName);
    waivers.forEach(w => teamWaivers.push({...w, season: parseInt(sNum)}));
  });
  teamWaivers.sort((a,b) => a.season - b.season || a.week - b.week);

  let waiverHtml = '';
  if (teamWaivers.length > 0) {
    const bySeason = {};
    teamWaivers.forEach(w => {
      if (!bySeason[w.season]) bySeason[w.season] = [];
      bySeason[w.season].push(w);
    });
    const seasonBlocks = Object.entries(bySeason).map(([sNum, waivers]) => {
      const rows = waivers.map(w => `
        <div style="display:grid;grid-template-columns:60px 1fr 1fr;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--text-muted)">Wk ${w.week}</span>
          <span><span style="color:var(--red)">− ${w.card_out}</span></span>
          <span><span style="color:var(--green)">+ ${w.card_in}</span></span>
        </div>`).join('');
      return `
        <div style="margin-bottom:20px">
          <div style="font-size:11px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">Season ${sNum} · ${waivers.length} transaction${waivers.length>1?'s':''}</div>
          ${rows}
        </div>`;
    }).join('');

    waiverHtml = `
      <div class="section-header" style="margin-top:8px"><span class="section-title">Roster Changes</span></div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px">
        <div style="display:grid;grid-template-columns:60px 1fr 1fr;gap:8px;padding-bottom:6px;margin-bottom:4px;border-bottom:2px solid var(--border)">
          <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em">Week</span>
          <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em">Card Out</span>
          <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em">Card In</span>
        </div>
        ${seasonBlocks}
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">${teamWaivers.length} total transactions across ${Object.keys(bySeason).length} season${Object.keys(bySeason).length>1?'s':''}</div>
      </div>`;
  }

  document.getElementById('content').innerHTML = html + waiverHtml;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
